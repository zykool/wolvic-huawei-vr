name: Build Wolvic APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [noapi, aosp]
        abi: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK (arm64-${{ matrix.variant }}-gecko-generic-debug)
      run: ./gradlew assembleArm64${{ matrix.variant }}GeckoGenericDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Wolvic-${{ matrix.variant }}-arm64-debug
        path: app/build/outputs/apk/**/${{ matrix.variant }}*/*.apk

    - name: Create Release on tag push
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
